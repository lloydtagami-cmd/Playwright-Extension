name: Build & Deploy automation testing
on:
  push:
    branches: [DevBranch]
    paths:
      - 'tests/**'
      - '!tests/smoke_testing/**'
  pull_request:
    branches: [DevBranch]
    paths:
      - 'tests/**'
      - '!tests/smoke_testing/**'
jobs:
    build-deploy: 
        name: Build & Deploy for beginner
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run Playwright tests - Smoke_testing
              run: npx playwright test tests/Smoke_testing
